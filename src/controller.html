<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';"
        />
        <title>Bible Overlay — Controller</title>
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --gold: #c9a84c;
                --gold-light: #e8cc7a;
                --bg: #0a0a14;
                --surface: #111120;
                --card: rgba(255, 255, 255, 0.04);
                --border: rgba(201, 168, 76, 0.28);
                --text: #ffffff;
                --muted: rgba(255, 255, 255, 0.75);
            }

            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "EB Garamond", Georgia, serif;
                user-select: none;
            }

            body {
                display: flex;
                flex-direction: column;
                padding: 18px 18px 12px;
                gap: 12px;
                overflow: hidden;
                height: 100%;
            }

            /* ── Header ── */
            .app-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border);
            }
            .app-title {
                font-family: "EB Garamond", serif;
                font-size: 18px;
                font-weight: bold;
                color: var(--gold);
                letter-spacing: 0.1em;
            }
            /* ── Connection row ── */
            .conn-row {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 12px;
                color: var(--muted);
            }
            .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: #444;
                flex-shrink: 0;
                transition:
                    background 0.4s,
                    box-shadow 0.4s;
            }
            .dot.on {
                background: #80c880;
                box-shadow: 0 0 7px #80c880;
            }
            .dot.pulse {
                animation: pulse 1.8s infinite;
                background: var(--gold);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* ── Cards ── */
            .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .card-title {
                font-family: "EB Garamond", serif;
                font-size: 13px;
                font-weight: bold;
                color: var(--muted);
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }
            .card-title.collapsible {
                display: flex;
                justify-content: space-between;
                align-items: center;
                cursor: pointer;
                user-select: none;
            }
            .card-title.collapsible:hover {
                color: var(--text);
            }
            .collapse-arrow {
                font-size: 9px;
                transition: transform 0.2s;
            }
            .card-title.collapsible.open .collapse-arrow {
                transform: rotate(180deg);
            }
            .collapsible-body {
                overflow: hidden;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .collapsible-body.collapsed {
                display: none;
            }

            /* ── Inputs ── */
            .input-row {
                display: flex;
                gap: 8px;
            }
            input[type="text"] {
                flex: 1;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 9px 13px 1px;
                line-height: 1;
                color: var(--text);
                font-family: "EB Garamond", serif;
                font-size: 16px;
                outline: none;
                transition: border-color 0.2s;
            }
            input::placeholder {
                color: rgba(255, 255, 255, 0.35);
            }
            input:focus {
                border-color: var(--gold);
            }

            select {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 7px 12px;
                color: var(--text);
                font-family: "EB Garamond", serif;
                font-size: 11px;
                outline: none;
                cursor: pointer;
                width: 100%;
            }
            select option {
                background: #111;
            }

            /* ── Buttons ── */
            .btn {
                border: none;
                cursor: pointer;
                border-radius: 7px;
                font-family: "EB Garamond", serif;
                font-size: 14px;
                letter-spacing: 0.05em;
                padding: 9px 16px;
                transition: all 0.12s;
                white-space: nowrap;
                position: relative;
                top: 0;
            }
            .btn-gold {
                background: linear-gradient(135deg, var(--gold), #a8762e);
                color: #080808;
                font-weight: 600;
                box-shadow:
                    0 4px 0 #6b4a18,
                    0 6px 8px rgba(0, 0, 0, 0.5);
            }
            .btn-gold:hover {
                filter: brightness(1.1);
                box-shadow:
                    0 5px 0 #6b4a18,
                    0 8px 12px rgba(0, 0, 0, 0.5);
                top: -1px;
            }
            .btn-gold:active,
            .btn-gold.pressing {
                top: 4px;
                box-shadow:
                    0 0px 0 #6b4a18,
                    0 2px 4px rgba(0, 0, 0, 0.4);
            }

            /* ── Status ── */
            #status {
                font-size: 13px;
                color: var(--muted);
                text-align: center;
                min-height: 18px;
            }
            #status.ok {
                color: #80c880;
            }
            #status.error {
                color: #f08080;
            }

            /* ── Size slider ── */
            .slider-row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .slider-row label {
                font-size: 12px;
                color: var(--muted);
                white-space: nowrap;
            }
            input[type="range"] {
                flex: 1;
                accent-color: var(--gold);
                cursor: pointer;
            }

            /* ── Loaded Verses ── */
            #loaded-card {
                flex: 1;
                min-height: 0;
            }
            #loaded {
                display: flex;
                flex-direction: column;
                gap: 3px;
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                width: 100%;
            }
            #loaded:empty::after {
                content: "No loaded verses yet";
                display: block;
                font-size: 16px;
                color: var(--muted);
                text-align: center;
                padding: 8px;
            }
            .ri {
                display: flex;
                flex-direction: row;
                align-items: baseline;
                gap: 8px;
                padding: 6px 9px;
                border-radius: 5px;
                cursor: pointer;
                transition: background 0.15s;
                font-size: 15px;
                color: var(--muted);
            }
            .ri:hover {
                background: rgba(201, 168, 76, 0.1);
                color: var(--gold-light);
            }
            .ri.active {
                background: rgba(80, 160, 80, 0.15);
                border: 1px solid rgba(80, 160, 80, 0.35);
                color: #90d890;
            }
            .ri-ref {
                font-family: "EB Garamond", serif;
                font-size: 15px;
                font-weight: 600;
            }
            .ri-preview {
                font-size: 15px;
                opacity: 1;
                line-height: 1.4;
                white-space: nowrap;
                overflow: hidden;
                flex: 1;
                min-width: 0;
                text-overflow: ellipsis;
            }

            /* ── Display screen picker ── */
            .screen-row {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .screen-row label {
                font-size: 12px;
                color: var(--muted);
                white-space: nowrap;
            }
            .screen-row select {
                flex: 1;
            }

            /* ── Hint ── */
            .hint {
                font-size: 11px;
                color: var(--muted);
                text-align: center;
                opacity: 0.6;
                padding-bottom: 4px;
            }
            kbd {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 3px;
                padding: 1px 5px;
                font-size: 10px;
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div class="app-header">
            <span class="app-title">✝ Bible Overlay</span>
        </div>

        <!-- Display Settings -->
        <div class="card">
            <div class="card-title collapsible" id="settings-toggle">
                Display Settings
                <span class="collapse-arrow">▼</span>
            </div>
            <div class="collapsible-body collapsed" id="settings-body">
                <div class="conn-row">
                    <div class="dot pulse" id="conn-dot"></div>
                    <span id="conn-label">Display window loading…</span>
                </div>
                <div class="screen-row">
                    <label>Projector on:</label>
                    <select id="screen-select"></select>
                </div>
                <div class="slider-row">
                    <label>Text size</label>
                    <input
                        type="range"
                        id="size-slider"
                        min="18"
                        max="72"
                        value="45"
                    />
                    <label id="size-label">45px</label>
                </div>
            </div>
        </div>

        <!-- Load verse -->
        <div class="card" style="padding-bottom: 8px; gap: 6px">
            <div class="card-title">Verse Reference</div>
            <div class="input-row">
                <input
                    id="ref-input"
                    type="text"
                    placeholder="John 3:16  ·  Psalm 23:1-3  ·  Gen 1:1"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button class="btn btn-gold" id="load-btn">
                    <span>Load</span>
                    <span
                        style="
                            display: block;
                            font-size: 9px;
                            opacity: 0.6;
                            font-weight: 400;
                            margin-top: 2px;
                            letter-spacing: 0.03em;
                        "
                        ><kbd>Enter ↵</kbd></span
                    >
                </button>
            </div>
            <div id="status"></div>
        </div>

        <!-- Loaded Verses -->
        <div class="card" id="loaded-card">
            <div
                class="card-title"
                style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                "
            >
                <span>Loaded Verses</span>
                <span
                    style="
                        font-size: 15px;
                        opacity: 0.55;
                        text-transform: none;
                        letter-spacing: 0;
                        font-weight: 400;
                    "
                    >Click verse to toggle display on/off</span
                >
            </div>
            <div id="loaded"></div>
        </div>

        <!-- Bible data -->
        <script src="bible-data.js"></script>
        <script src="bible-parser.js"></script>
        <script>
            // ── State ──────────────────────────────────────────────────────────────────
            let currentVerse = null;
            let displayedVerse = null;
            let loadedVerses = [];
            let verseVisible = false;

            // ── Screen picker ──────────────────────────────────────────────────────────
            async function loadScreens() {
                const displays = await window.electronAPI.getDisplays();
                const sel = document.getElementById("screen-select");
                sel.innerHTML = "";
                displays.forEach((d) => {
                    const opt = document.createElement("option");
                    opt.value = d.id;
                    opt.textContent = d.isPrimary
                        ? `${d.label} (Primary)`
                        : d.label;
                    if (!d.isPrimary) opt.selected = true; // default to secondary
                    sel.appendChild(opt);
                });
            }
            loadScreens();

            document
                .getElementById("screen-select")
                .addEventListener("change", function () {
                    window.electronAPI.sendCommand({
                        type: "move-display",
                        displayId: parseInt(this.value),
                    });
                });

            // ── Connection dot ─────────────────────────────────────────────────────────
            // The display window is always open (managed by main.js), so just mark connected after short delay
            setTimeout(() => {
                document.getElementById("conn-dot").classList.remove("pulse");
                document.getElementById("conn-dot").classList.add("on");
                document.getElementById("conn-label").textContent =
                    "Display window active ✓";
            }, 1200);

            // ── Load verse ─────────────────────────────────────────────────────────────
            function loadVerse() {
                const raw = document.getElementById("ref-input").value.trim();
                if (!raw) {
                    setStatus("Enter a verse reference", "error");
                    return;
                }

                const results = parseRefs(raw);
                if (!results) {
                    setStatus(
                        'Not found — try "John 3:16" or "Ps 23:1"',
                        "error",
                    );
                    return;
                }

                results
                    .slice()
                    .reverse()
                    .forEach((r) => addToLoaded(r));
                currentVerse = results[0];
                document.getElementById("ref-input").value = "";
                setStatus(
                    "✓ " +
                        results.map((r) => r.reference).join(", ") +
                        " — select the loaded verse to display",
                    "ok",
                );
            }

            // ── Controls ───────────────────────────────────────────────────────────────
            function hideVerse() {
                window.electronAPI.sendCommand({ type: "hide" });
                verseVisible = false;
                displayedVerse = null;
                renderLoaded();
            }

            // ── Size ───────────────────────────────────────────────────────────────────
            document
                .getElementById("size-slider")
                .addEventListener("input", function () {
                    document.getElementById("size-label").textContent =
                        this.value + "px";
                    window.electronAPI.sendCommand({
                        type: "size",
                        value: parseInt(this.value),
                    });
                });

            // ── Loaded Verses ──────────────────────────────────────────────────────────
            function addToLoaded(verse) {
                loadedVerses = loadedVerses.filter(
                    (v) => v.reference !== verse.reference,
                );
                loadedVerses.unshift(verse);
                if (loadedVerses.length > 30) loadedVerses.pop();
                renderLoaded();
            }
            function renderLoaded() {
                const el = document.getElementById("loaded");
                el.innerHTML = "";
                loadedVerses.forEach((v) => {
                    const div = document.createElement("div");
                    div.className =
                        "ri" +
                        (verseVisible &&
                        currentVerse &&
                        currentVerse.reference === v.reference
                            ? " active"
                            : "");
                    div.innerHTML = `<span class="ri-ref">${v.shortRef}</span><span class="ri-preview">${v.text}</span>`;
                    div.addEventListener("click", () => {
                        if (
                            displayedVerse &&
                            displayedVerse.reference === v.reference &&
                            verseVisible
                        ) {
                            hideVerse();
                        } else {
                            currentVerse = v;
                            displayedVerse = v;
                            window.electronAPI.sendCommand({
                                type: "verse",
                                verse: v,
                            });
                            window.electronAPI.sendCommand({ type: "show" });
                            verseVisible = true;
                            renderLoaded();
                        }
                    });
                    el.appendChild(div);
                });
            }

            // ── Status ─────────────────────────────────────────────────────────────────
            let statusTimer = null;
            function setStatus(msg, type) {
                const el = document.getElementById("status");
                el.textContent = msg;
                el.className = type || "";
                clearTimeout(statusTimer);
                if (type === "ok") {
                    statusTimer = setTimeout(() => {
                        el.textContent = "";
                        el.className = "";
                    }, 3000);
                }
            }

            // ── Wire up buttons ────────────────────────────────────────────────────────
            document
                .getElementById("load-btn")
                .addEventListener("click", loadVerse);

            // ── Keyboard shortcuts ─────────────────────────────────────────────────────
            function flashLoadBtn() {
                const btn = document.getElementById("load-btn");
                btn.classList.add("pressing");
                setTimeout(() => btn.classList.remove("pressing"), 150);
            }

            document.addEventListener("keydown", (e) => {
                const typing = ["INPUT", "SELECT", "TEXTAREA"].includes(
                    e.target.tagName,
                );
                if (typing) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        flashLoadBtn();
                        loadVerse();
                    }
                    return;
                }
                if (e.key === "Enter") {
                    flashLoadBtn();
                    loadVerse();
                }
            });

            document.getElementById("ref-input").focus();

            // ── Collapsible display settings ───────────────────────────────────────────
            document
                .getElementById("settings-toggle")
                .addEventListener("click", () => {
                    const toggle = document.getElementById("settings-toggle");
                    const body = document.getElementById("settings-body");
                    const open = !body.classList.contains("collapsed");
                    body.classList.toggle("collapsed", open);
                    toggle.classList.toggle("open", !open);
                });
        </script>
    </body>
</html>
