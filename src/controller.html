<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
<title>Bible Overlay — Controller</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --bg: #0a0a14;
    --surface: #111120;
    --card: rgba(255,255,255,0.04);
    --border: rgba(201,168,76,0.28);
    --text: #f0ead8;
    --muted: rgba(240,234,216,0.48);
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    user-select: none;
  }

  body {
    display: flex; flex-direction: column;
    padding: 18px 18px 12px; gap: 12px; overflow-y: auto;
  }

  /* ── Header ── */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .app-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: .1em; }
  .badge-offline {
    font-size: 9px; font-family: 'Cinzel', serif; letter-spacing: .06em;
    background: rgba(80,180,80,0.15); border: 1px solid rgba(80,180,80,0.35);
    color: #80c880; border-radius: 20px; padding: 3px 9px;
  }

  /* ── Connection row ── */
  .conn-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #444; flex-shrink: 0; transition: background .4s, box-shadow .4s;
  }
  .dot.on { background: #80c880; box-shadow: 0 0 7px #80c880; }
  .dot.pulse { animation: pulse 1.8s infinite; background: var(--gold); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 10px; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
  }

  /* ── Inputs ── */
  .input-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 13px; color: var(--text);
    font-family: 'EB Garamond', serif; font-size: 16px; outline: none;
    transition: border-color .2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--gold); }

  select {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 12px; color: var(--text);
    font-family: 'Cinzel', serif; font-size: 11px; outline: none;
    cursor: pointer; width: 100%;
  }
  select option { background: #111; }

  /* ── Buttons ── */
  .btn {
    border: none; cursor: pointer; border-radius: 7px;
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .05em;
    padding: 9px 16px; transition: all .18s; white-space: nowrap;
  }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #a8762e); color: #080808; font-weight: 600; }
  .btn-gold:hover { filter: brightness(1.15); }
  .btn-show { background: rgba(80,160,80,0.2); border: 1px solid rgba(80,160,80,0.4); color: #90d890; }
  .btn-show:hover { background: rgba(80,160,80,0.38); }
  .btn-hide { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--text); }
  .btn-hide:hover { background: rgba(255,255,255,0.13); border-color: var(--gold); }
  .btn-clear { background: rgba(180,50,50,0.2); border: 1px solid rgba(180,50,50,0.38); color: #f09090; }
  .btn-clear:hover { background: rgba(180,50,50,0.4); }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* ── Status ── */
  #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
  #status.ok { color: #80c880; }
  #status.error { color: #f08080; }

  /* ── Preview ── */
  #preview {
    background: rgba(0,0,0,0.35); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; min-height: 68px;
    display: flex; flex-direction: column; justify-content: center;
  }
  #preview-empty { color: var(--muted); font-size: 13px; text-align: center; }
  #preview-text { font-style: italic; font-size: 14px; line-height: 1.5; color: var(--text); display: none; }
  #preview-ref { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); margin-top: 6px; letter-spacing: .07em; display: none; }

  /* ── Size slider ── */
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: var(--gold); cursor: pointer; }

  /* ── Position buttons ── */
  .pos-row { display: flex; gap: 6px; }
  .pos-btn {
    flex: 1; font-size: 11px; padding: 7px; text-align: center;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); cursor: pointer;
    transition: all .18s; font-family: 'Cinzel', serif;
  }
  .pos-btn.active { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold); }
  .pos-btn:hover:not(.active) { background: rgba(255,255,255,0.08); }

  /* ── Recent ── */
  #recent { display: flex; flex-direction: column; gap: 3px; max-height: 150px; overflow-y: auto; }
  #recent:empty::after {
    content: 'No recent verses yet'; display: block;
    font-size: 12px; color: var(--muted); text-align: center; padding: 8px;
  }
  .ri {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 9px; border-radius: 5px; cursor: pointer;
    transition: background .15s; font-size: 13px; color: var(--muted);
  }
  .ri:hover { background: rgba(201,168,76,0.1); color: var(--gold-light); }
  .ri-ref { font-family: 'Cinzel', serif; font-size: 11px; flex-shrink: 0; }
  .ri-preview { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px; opacity: .55; margin-left: 8px; }

  /* ── Display screen picker ── */
  .screen-row { display: flex; gap: 8px; align-items: center; }
  .screen-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .screen-row select { flex: 1; }

  /* ── Hint ── */
  .hint { font-size: 11px; color: var(--muted); text-align: center; opacity: .6; padding-bottom: 4px; }
  kbd {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px; padding: 1px 5px; font-size: 10px; font-family: monospace;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <span class="app-title">✝ Bible Overlay</span>
  <span class="badge-offline">KJV · OFFLINE</span>
</div>

<!-- Connection status -->
<div class="conn-row">
  <div class="dot pulse" id="conn-dot"></div>
  <span id="conn-label">Display window loading…</span>
</div>

<!-- Screen picker -->
<div class="card">
  <div class="card-title">Display Screen</div>
  <div class="screen-row">
    <label>Projector on:</label>
    <select id="screen-select"></select>
  </div>
</div>

<!-- Load verse -->
<div class="card">
  <div class="card-title">Verse Reference</div>
  <div class="input-row">
    <input id="ref-input" type="text" placeholder="John 3:16  ·  Psalm 23:1-3  ·  Gen 1:1" autocomplete="off" spellcheck="false"/>
    <button class="btn btn-gold" id="load-btn">Load</button>
  </div>
  <div id="status">31,102 KJV verses ready</div>
</div>

<!-- Preview -->
<div class="card">
  <div class="card-title">Preview</div>
  <div id="preview">
    <div id="preview-empty">No verse loaded</div>
    <div id="preview-text"></div>
    <div id="preview-ref"></div>
  </div>
</div>

<!-- Controls -->
<div class="card">
  <div class="card-title">Display Controls</div>
  <div class="btn-row">
    <button class="btn btn-show" id="show-btn">▶ Show <kbd>Space</kbd></button>
    <button class="btn btn-hide" id="hide-btn">◼ Hide <kbd>H</kbd></button>
    <button class="btn btn-clear" id="clear-btn">✕ Clear</button>
  </div>

  <div class="slider-row">
    <label>Text size</label>
    <input type="range" id="size-slider" min="18" max="72" value="36"/>
    <label id="size-label">36px</label>
  </div>

  <div class="pos-row">
    <button class="pos-btn active" data-pos="bottom">⬇ Bottom</button>
    <button class="pos-btn" data-pos="middle">⬛ Middle</button>
    <button class="pos-btn" data-pos="top">⬆ Top</button>
  </div>
</div>

<!-- Recent -->
<div class="card">
  <div class="card-title">Recent Verses</div>
  <div id="recent"></div>
</div>

<div class="hint"><kbd>Enter</kbd> load &nbsp;·&nbsp; <kbd>Space</kbd> show/hide &nbsp;·&nbsp; <kbd>H</kbd> hide</div>

<!-- Bible data -->
<script src="bible-data.js"></script>
<script src="bible-parser.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentVerse = null;
let recentVerses = [];
let verseVisible = false;

// ── Screen picker ──────────────────────────────────────────────────────────
async function loadScreens() {
  const displays = await window.electronAPI.getDisplays();
  const sel = document.getElementById('screen-select');
  sel.innerHTML = '';
  displays.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.isPrimary ? `${d.label} (Primary)` : d.label;
    if (!d.isPrimary) opt.selected = true; // default to secondary
    sel.appendChild(opt);
  });
}
loadScreens();

document.getElementById('screen-select').addEventListener('change', function() {
  window.electronAPI.sendCommand({ type: 'move-display', displayId: parseInt(this.value) });
});

// ── Connection dot ─────────────────────────────────────────────────────────
// The display window is always open (managed by main.js), so just mark connected after short delay
setTimeout(() => {
  document.getElementById('conn-dot').classList.remove('pulse');
  document.getElementById('conn-dot').classList.add('on');
  document.getElementById('conn-label').textContent = 'Display window active ✓';
}, 1200);

// ── Load verse ─────────────────────────────────────────────────────────────
function loadVerse() {
  const raw = document.getElementById('ref-input').value.trim();
  if (!raw) { setStatus('Enter a verse reference', 'error'); return; }

  const result = parseRef(raw);
  if (!result) { setStatus('Not found — try "John 3:16" or "Ps 23:1"', 'error'); return; }

  currentVerse = result;
  updatePreview(result);
  addToRecent(result);
  setStatus('✓ ' + result.reference, 'ok');

  window.electronAPI.sendCommand({ type: 'verse', verse: result });
  window.electronAPI.sendCommand({ type: 'show' });
  verseVisible = true;
}

function updatePreview(verse) {
  document.getElementById('preview-empty').style.display = 'none';
  const pt = document.getElementById('preview-text');
  const pr = document.getElementById('preview-ref');
  pt.style.display = '';
  pt.textContent = '\u201c' + verse.text.substring(0, 120) + (verse.text.length > 120 ? '\u2026' : '') + '\u201d';
  pr.style.display = '';
  pr.textContent = '\u2014 ' + verse.reference;
}

// ── Controls ───────────────────────────────────────────────────────────────
function showVerse() {
  if (!currentVerse) { setStatus('Load a verse first', 'error'); return; }
  window.electronAPI.sendCommand({ type: 'show' });
  verseVisible = true;
}
function hideVerse() {
  window.electronAPI.sendCommand({ type: 'hide' });
  verseVisible = false;
}
function clearVerse() {
  window.electronAPI.sendCommand({ type: 'clear' });
  currentVerse = null; verseVisible = false;
  document.getElementById('preview-empty').style.display = '';
  document.getElementById('preview-text').style.display = 'none';
  document.getElementById('preview-ref').style.display = 'none';
  document.getElementById('ref-input').value = '';
  setStatus('');
}
function toggleVerse() { verseVisible ? hideVerse() : showVerse(); }

// ── Size ───────────────────────────────────────────────────────────────────
document.getElementById('size-slider').addEventListener('input', function() {
  document.getElementById('size-label').textContent = this.value + 'px';
  window.electronAPI.sendCommand({ type: 'size', value: parseInt(this.value) });
});

// ── Position ───────────────────────────────────────────────────────────────
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    window.electronAPI.sendCommand({ type: 'position', value: btn.dataset.pos });
  });
});

// ── Recent ─────────────────────────────────────────────────────────────────
function addToRecent(verse) {
  recentVerses = recentVerses.filter(v => v.reference !== verse.reference);
  recentVerses.unshift(verse);
  if (recentVerses.length > 12) recentVerses.pop();
  renderRecent();
}
function renderRecent() {
  const el = document.getElementById('recent');
  el.innerHTML = '';
  recentVerses.forEach(v => {
    const div = document.createElement('div');
    div.className = 'ri';
    div.innerHTML = `<span class="ri-ref">${v.reference}</span><span class="ri-preview">${v.text.substring(0,45)}\u2026</span>`;
    div.addEventListener('click', () => {
      currentVerse = v;
      updatePreview(v);
      document.getElementById('ref-input').value = v.reference.replace(' (KJV)', '');
      setStatus('\u2713 ' + v.reference, 'ok');
      window.electronAPI.sendCommand({ type: 'verse', verse: v });
      window.electronAPI.sendCommand({ type: 'show' });
      verseVisible = true;
    });
    el.appendChild(div);
  });
}

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = type || '';
}

// ── Wire up buttons ────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', loadVerse);
document.getElementById('show-btn').addEventListener('click', showVerse);
document.getElementById('hide-btn').addEventListener('click', hideVerse);
document.getElementById('clear-btn').addEventListener('click', clearVerse);

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const typing = ['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName);
  if (typing) { if (e.key === 'Enter') { e.preventDefault(); loadVerse(); } return; }
  if (e.code === 'Space') { e.preventDefault(); toggleVerse(); }
  if (e.key === 'h' || e.key === 'H') hideVerse();
  if (e.key === 'Enter') loadVerse();
});

document.getElementById('ref-input').focus();
</script>
</body>
</html>
