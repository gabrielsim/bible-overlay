<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';"
        />
        <title>Bible Overlay — Display</title>
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --gold: #c9a84c;
                --gold-light: #e8cc7a;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: transparent !important;
                overflow: hidden;
                -webkit-app-region: no-drag;
            }

            /* ── Verse overlay ───────────────────────────────────────────────────────── */
            #overlay {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 50px 80px 60px;
                background: rgba(0, 0, 0, 0.9);
                transition:
                    opacity 0.55s ease,
                    transform 0.55s ease;
                pointer-events: none;
            }
            #overlay.hidden {
                opacity: 0;
                transform: translateY(28px);
            }

            #inner {
                width: 90%;
                margin: 0 auto;
            }

            /* Gold decorative line */
            #inner::before {
                content: "";
                display: block;
                width: 72px;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--gold),
                    transparent
                );
                margin-bottom: 22px;
            }

            #verse-text {
                font-family: "EB Garamond", Georgia, serif;
                font-size: 45px;
                font-style: normal;
                color: #ffffff;
                line-height: 1.6;
                text-shadow:
                    0 2px 30px rgba(0, 0, 0, 0.98),
                    0 0 80px rgba(0, 0, 0, 0.7);
                margin-bottom: 14px;
                letter-spacing: 0.01em;
            }

            #verse-ref {
                font-family: "Cinzel", serif;
                font-size: 32px;
                font-weight: bold;
                color: var(--gold);
                letter-spacing: 0.14em;
                text-shadow: 0 2px 14px rgba(0, 0, 0, 0.95);
            }
        </style>
    </head>
    <body>
        <div id="overlay" class="hidden">
            <div id="inner">
                <div id="verse-text"></div>
                <div id="verse-ref"></div>
            </div>
        </div>

        <script>
            const overlay = document.getElementById("overlay");
            const verseText = document.getElementById("verse-text");
            const verseRef = document.getElementById("verse-ref");

            // ── Listen to commands from main process (via preload) ────────────────────
            window.electronAPI.onCommand((msg) => {
                switch (msg.type) {
                    case "verse":
                        verseText.textContent = msg.verse.text;
                        verseRef.textContent = "\u2014 " + msg.verse.reference;
                        break;

                    case "show":
                        overlay.classList.remove("hidden");
                        break;

                    case "hide":
                        overlay.classList.add("hidden");
                        break;

                    case "clear":
                        overlay.classList.add("hidden");
                        setTimeout(() => {
                            verseText.textContent = "";
                            verseRef.textContent = "";
                        }, 560);
                        break;

                    case "size":
                        verseText.style.fontSize = msg.value + "px";
                        verseRef.style.fontSize = msg.value + "px";
                        break;

                    case "font":
                        verseText.style.fontFamily = msg.value;
                        verseRef.style.fontFamily = msg.value;
                        break;

                    case "bold":
                        verseText.style.fontWeight = msg.value ? "bold" : "normal";
                        verseRef.style.fontWeight = msg.value ? "bold" : "normal";
                        break;
                }
            });
        </script>
    </body>
</html>
