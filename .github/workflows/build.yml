name: Build

on:
    release:
        types: [created]

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: macos-latest
                      script: build:mac
                    - os: windows-latest
                      script: build:win

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - run: npm ci

            - run: npm run ${{ matrix.script }}

            - name: Upload to release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/**
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
