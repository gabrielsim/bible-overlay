name: Build

on:
    release:
        types: [created]

permissions:
    contents: write

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: macos-latest
                      script: build:mac
                      artifacts: "dist/*.dmg"
                    - os: windows-latest
                      script: build:win
                      artifacts: "dist/*.exe"

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - run: npm ci

            - run: npm run ${{ matrix.script }} -- --publish never

            - name: Upload to release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ matrix.artifacts }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
